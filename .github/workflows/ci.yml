name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1
  # CI-only secrets — every real environment must set its own distinct,
  # randomly generated values (see .env.example, ADR-005).
  DATABASE_URL: postgresql://fluent:fluent_ci_password@localhost:5432/project_fluent
  AUTH_JWT_SECRET: ci-only-api-jwt-secret-6f2b9d1c4a7e8f30-do-not-use-in-production
  NEXTAUTH_SECRET: ci-only-web-nextauth-secret-9a1e5c8b2d6f4037-do-not-use-in-production
  NEXTAUTH_URL: http://localhost:3100
  API_URL: http://localhost:4000

jobs:
  build-lint-test:
    name: Build, Lint, Typecheck, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fluent
          POSTGRES_PASSWORD: fluent_ci_password
          POSTGRES_DB: project_fluent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fluent -d project_fluent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @project-fluent/web exec playwright install --with-deps chromium

      - name: Apply database migrations
        run: pnpm --filter @project-fluent/api exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit and module tests
        run: pnpm test

      - name: End-to-end tests
        run: pnpm test:e2e

      - name: Format check
        run: pnpm format:check
