services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fluent
      POSTGRES_PASSWORD: fluent_dev_password
      POSTGRES_DB: project_fluent
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fluent -d project_fluent']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DEPLOYMENT_ENVIRONMENT: local
      PORT: 4000
      DATABASE_URL: postgresql://fluent:fluent_dev_password@postgres:5432/project_fluent
      REDIS_URL: redis://redis:6379
      WEB_APP_URL: http://localhost:3100
      # Development-only secrets. Every real environment must set its own
      # distinct, randomly generated value (see .env.example).
      AUTH_JWT_SECRET: dev-only-api-jwt-secret-6f2b9d1c4a7e8f30-do-not-use-in-production
      AUTH_JWT_EXPIRES_IN: 1d
      # Placeholder only — the AI Integration Module (M21) is not invoked by
      # anything yet (its only permitted caller, Session Generation, does
      # not exist until a future sprint), so this key is never actually
      # used to call the Anthropic API in Version 1's current scope. Every
      # real environment must set its own real key (see .env.example).
      ANTHROPIC_API_KEY: dev-only-placeholder-not-a-real-anthropic-key-do-not-use-in-production
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DEPLOYMENT_ENVIRONMENT: local
      # NEXT_PUBLIC_API_URL is NOT set here: it's inlined into the client
      # bundle at build time (see the `args` above and apps/web/Dockerfile),
      # so setting it as a container-runtime env var here would have no
      # effect on the already-built JavaScript.
      # Server-side URL: reaches the api container over the Docker network,
      # distinct from the browser-facing NEXT_PUBLIC_API_URL above.
      API_URL: http://api:4000
      NEXTAUTH_URL: http://localhost:3100
      # Development-only secret, intentionally different from the api
      # service's AUTH_JWT_SECRET (see ADR-005 and .env.example).
      NEXTAUTH_SECRET: dev-only-web-nextauth-secret-9a1e5c8b2d6f4037-do-not-use-in-production
    ports:
      - '3100:3100'
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
